version: '3.8'

services:
  kongming-backend:
    build: .
    container_name: kongming-backend
    ports:
      - "8000:8000"
    environment:
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-qwen2.5:7b}
      - LLM_API_KEY=${LLM_API_KEY:-ollama}
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      - TEMPERATURE=${TEMPERATURE:-0.45}
      - TOP_P=${TOP_P:-0.7}
    volumes:
      - .:/app
    restart: unless-stopped
    networks:
      - kongming-network
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  kongming-network:
    driver: bridge